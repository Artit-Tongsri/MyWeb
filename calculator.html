    <title>Calculator</title>

<body>
    <h2>เครื่องคิดเลข</h2>

    <input type="number" id="num1" placeholder="ตัวเลขที่ 1">
    <input type="number" id="num2" placeholder="ตัวเลขที่ 2">
    <br><br>
    <button onclick="calculate('+')">บวก</button>    
    <button onclick="calculate('-')">ลบ</button>
    <button onclick="calculate('*')">คูณ</button>
    <button onclick="calculate('/')">หาร</button>   
    
    <h3 id="result">ผลลัพธ์: ?</h3>

    <h3>ประวัติ</h3>
    <ul id="history"></ul>

    <script>
            function add(a, b) { return a + b; }
        function subtract(a, b) { return a - b; }
        function multiply(a, b) { return a * b; }
        function divide(a, b) {
            if (b === 0) return 'หารด้วยศูนย์ไม่ได้!';
            return a / b;
        }

        function calculate(operator){
            const num1 = Number(document.getElementById('num1').value);
            const num2 = Number(document.getElementById('num2').value);
            
            let result;
            if (operator === '+'){result = add(num1, num2);} 
                else if (operator === '-'){result = subtract(num1, num2);}
                else if (operator === '*'){result = multiply(num1, num2);}
                else if (operator === '/'){result = divide(num1, num2);}
            
            document.getElementById('result').textContent = 'ผลลัพธ์ ' + result;
        const historylist = document.getElementById('history');
        const newItem = document.createElement('li');
        newItem.textContent = num1 + ' ' + operator + ' ' + num2 + ' = ' + result;
        historylist.appendChild(newItem);
        }
